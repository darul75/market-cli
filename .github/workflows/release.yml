name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-arm64
            runs-on: macos-latest
          - platform: macos-x64
            runs-on: macos-latest
          - platform: linux-x64
            runs-on: ubuntu-latest
          - platform: windows-x64
            runs-on: windows-latest
    
    runs-on: ${{ matrix.runs-on }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build ${{ matrix.platform }}
        run: bun build src/main.ts --compile --outfile=market-cli-${{ matrix.platform }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-cli-${{ matrix.platform }}
          path: market-cli-${{ matrix.platform }}

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: market-cli-*
          merge-multiple: false
      
      - name: Generate checksums
        run: sha256sum market-cli-* > SHA256SUMS.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            market-cli-*
            SHA256SUMS.txt
