name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      
      - name: Install dependencies
        run: bun install
      
      - name: Build macOS ARM64
        run: bun build src/main.ts --compile --outfile=market-cli
      
      - name: Create tar.gz archive
        run: tar -czvf market-cli-macos-arm64.tar.gz market-cli

      - name: Generate checksums
        run: sha256sum market-cli-macos-arm64.tar.gz > SHA256SUMS.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            market-cli-macos-arm64.tar.gz
            SHA256SUMS.txt
